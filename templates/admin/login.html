<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Nova Marketing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #111;
            padding: 2.5rem;
            border-radius: 28px;
            border: 1px solid #D4AF37;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-container h1 { color: #D4AF37; font-size: 2rem; margin-bottom: 0.5rem; }
        .login-container p { color: #888; margin-bottom: 2rem; }
        input { width: 100%; padding: 14px; margin: 12px 0; background: #1A1A1A; border: 1px solid #333; border-radius: 12px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #D4AF37; }
        button { width: 100%; padding: 14px; background: #D4AF37; color: black; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; margin-top: 12px; }
        button:hover { background: #e6c453; }
        .error { color: #ff6b6b; margin-top: 12px; }
        .info { margin-top: 1rem; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>NOVA ADMIN</h1>
        <p>Black & Gold Portal</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <div class="info">novadmin / Nova@2025</div>
    </div>
</body>
</html>
