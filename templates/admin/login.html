<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Nova Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F6F7;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(32, 137, 172, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-container {
            background: #FFFFFF;
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 28px;
            border: 1px solid #E2E6E9;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #17647E, #2089AC);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(32, 137, 172, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(32, 137, 172, 0); }
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-container h1 {
            color: #17647E;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-container p {
            color: #4A4A4A;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #2089AC;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: #F5F6F7;
            border: 1px solid #E2E6E9;
            border-radius: 16px;
            color: #1A1A1A;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #2089AC;
            box-shadow: 0 0 0 3px rgba(32, 137, 172, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #17647E, #2089AC);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 12px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(32, 137, 172, 0.4);
        }

        .error {
            color: #dc3545;
            margin-top: 12px;
            font-size: 0.85rem;
            background: rgba(220, 53, 69, 0.1);
            padding: 10px;
            border-radius: 12px;
        }

        .info {
            margin-top: 1.5rem;
            color: #4A4A4A;
            font-size: 0.8rem;
            background: #F5F6F7;
            padding: 12px;
            border-radius: 16px;
        }

        .info span {
            color: #2089AC;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-icon">
            <img src="/static/profile-pic.png" alt="Nova Logo">
        </div>
        <h1>NOVA ADMIN</h1>
        <p>Sign in to your dashboard</p>
        <form method="POST">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <div class="info">
            <i class="fas fa-key"></i> Default: <span>novadmin</span> / <span>Nova@2025</span>
        </div>
    </div>
</body>
</html>
